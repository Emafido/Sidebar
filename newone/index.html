<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
  <link rel="stylesheet" href="style.css">
  <title>Side Bar</title>
</head>
<body>
  <div class="main">
    <input type="checkbox" id="check">
    <div class="btn1">
      <label for="check">
        <i class="fa-solid fa-bars"></i>
      </label>
    </div>
    <div class="sidebar">
      <div class="logo">
        <a href="#">CodingLab</a>
      </div>
      <div class="btn2">
        <label for="check">
          <i class="fa-solid fa-xmark"></i>
        </label>
      </div>
    <div class="menu">
      <ul>
        <li><a href="#"><i class="fa-solid fa-qrcode"></i>Dashboard</a></li>
        <li><a href="#"><i class="fa-solid fa-link"></i>Shortcut</a></li>
        <li><a href="#"><i class="fa-solid fa-bars-staggered"></i>Overview</a></li>
        <li><a href="#"><i class="fa-solid fa-calendar"></i>Events</a></li>
        <li><a href="#"><i class="fa-solid fa-circle-question"></i>About</a></li>
        <li><a href="#"><i class="fa-solid fa-bars"></i>Services</a></li>
        <li><a href="#"><i class="fa-solid fa-phone-volume"></i>Contact</a></li>
        <li><a href="#"><i class="fa-solid fa-comments"></i>Feedback</a></li>
      </ul>
    </div>
    <div class="socialmedia">
      <a href="#"><i class="fa-brands fa-facebook"></i></a>
      <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
      <a href="#"><i class="fa-brands fa-instagram"></i></a>
      <a href="#"><i class="fa-brands fa-youtube"></i></a>
    </div>
    </div>
  </div>
</body>
</html>
